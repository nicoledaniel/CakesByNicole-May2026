<script>
function getCart() {
  return JSON.parse(localStorage.getItem("cakesByNicoleCart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cakesByNicoleCart", JSON.stringify(cart));
}

function getCartTotal() {
  let total = 0;

  getCart().forEach(function (item) {
    total += Number(item.price.replace("$", ""));
  });

  return total;
}

function updateCartTotal() {
  const cartTotal = document.getElementById("cartTotal");

  if (cartTotal) {
    cartTotal.textContent = "$" + getCartTotal().toFixed(2);
  }
}

function addToCart(itemClicked) {
  let card;

  if (typeof itemClicked === "string") {
    document.querySelectorAll(".product-card").forEach(function (oneCard) {
      const name = oneCard.querySelector("h3").textContent.trim();

      if (name === itemClicked) {
        card = oneCard;
      }
    });
  } else {
    card = itemClicked.closest(".product-card");
  }

  if (!card) {
    return;
  }

const img = card.querySelector(".cake-icon img");

const item = {
  name: card.querySelector("h3").textContent.trim(),
  price: card.querySelector("p").textContent.trim(),
  image: img ? img.getAttribute("src") : "",
  icon: card.querySelector(".cake-icon").textContent.trim()
};

  const cart = getCart();
  cart.push(item);
  saveCart(cart);
  updateCartTotal();
}

document.querySelectorAll(".product-card button").forEach(function (button) {
  button.addEventListener("click", function () {
    addToCart(button);
  });
});

function filterCards(searchText) {
  const search = (searchText || "").toLowerCase().trim();
  const cards = document.querySelectorAll(".product-card");

  cards.forEach(function (card) {
    const name = card.querySelector("h3").textContent.toLowerCase();
    const tags = card.dataset.tags || "";
    const searchableText = name + " " + tags;

    if (
      search === "" ||
      search === "all cakes" ||
      searchableText.includes(search)
    ) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

const homeSearchForm = document.getElementById("homeSearchForm");
const homeSearchInput = document.getElementById("homeSearchInput");

if (homeSearchForm && homeSearchInput) {
  homeSearchForm.addEventListener("submit", function (event) {
    event.preventDefault();
    window.location.href = "cakes.html?search=" + encodeURIComponent(homeSearchInput.value || "All Cakes");
  });
}

const cakeSearchForm = document.getElementById("cakeSearchForm");
const searchInput = document.getElementById("searchInput");

if (cakeSearchForm && searchInput) {
  cakeSearchForm.addEventListener("submit", function (event) {
    event.preventDefault();
    filterCards(searchInput.value);
  });

  searchInput.addEventListener("input", function () {
    filterCards(searchInput.value);
  });

  const params = new URLSearchParams(window.location.search);
  const search = params.get("search") || "All Cakes";

  searchInput.value = search;
  filterCards(search);
}

const departmentButton = document.getElementById("departmentButton");
const departmentMenu = document.getElementById("departmentMenu");

if (departmentButton && departmentMenu) {
  departmentButton.addEventListener("click", function () {
    departmentMenu.classList.toggle("show");
  });
}

function renderCart() {
  const cartItems = document.getElementById("cartItems");
  const cartSummary = document.getElementById("cartSummary");

  if (!cartItems || !cartSummary) {
    return;
  }

  const cart = getCart();

  if (cart.length === 0) {
    cartItems.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
  } else {
    cartItems.innerHTML = cart.map(function (item, index) {
      return `
       <div class="cart-item">
        <div class="cart-item-image">
          ${item.image ? `<img src="${item.image}" alt="${item.name}">` : item.icon}
        </div>

        <div>
          <h3>${item.name}</h3>
        </div>

        <p>${item.price}</p>

        <button class="remove-button" type="button" onclick="removeItem(${index})">Remove</button>
      </div>
      `;
    }).join("");
  }

  cartSummary.textContent = "Total: $" + getCartTotal().toFixed(2);
}

function removeItem(index) {
  const cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
  updateCartTotal();
}

const checkoutButton = document.getElementById("checkoutButton");

if (checkoutButton) {
  checkoutButton.addEventListener("click", function () {
    const cart = getCart();

    if (cart.length === 0) {
      alert("Please Add a Product to your Cart First!");
      return;
    }

    saveCart([]);

    document.getElementById("cartItems").innerHTML =
      '<p class="order-message">Order completed! 🎉</p>';

    document.getElementById("cartSummary").style.display = "none";
    checkoutButton.style.display = "none";

    updateCartTotal();
  });
}

renderCart();
updateCartTotal();

const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImage");

document.querySelectorAll(".cake-icon img").forEach(function(img) {
  img.addEventListener("click", function() {
    modal.style.display = "flex";
    modalImg.src = this.src;
  });
});

/* Click anywhere to close */
modal.addEventListener("click", function() {
  modal.style.display = "none";
});
</script>
