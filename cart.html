<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart | Cakes by Nicole</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="main-header">
    <a class="logo" href="index.html">Cakes<small>BY NICOLE</small></a>

    <form class="search-box" id="homeSearchForm">
      <input id="homeSearchInput" type="text" placeholder="Search for products..." />
      <button type="submit">🔍</button>
    </form>

    <a class="cart" href="cart.html">
      🛒 <strong>Shopping Cart</strong>
      <span id="cartTotal">$0.00</span>
    </a>
  </header>

  <main class="cart-page">
    <h2 class="section-title">Shopping Cart</h2>
    <p class="section-message">Review the cakes you added before checking out.</p>

    <div class="cart-box">
      <div id="cartItems"></div>

      <div class="cart-summary" id="cartSummary">Total: $0.00</div>

      <div class="cart-actions">
        <a class="back-button" href="cakes.html?search=All%20Cakes">Back to Shop</a>
        <button class="checkout-button" id="checkoutButton" type="button">Checkout</button>
      </div>

      <p class="order-message" id="orderMessage"></p>
    </div>
  </main>

  <footer>
    <p>© 2026 Cakes by Nicole | Fresh cakes for every occasion</p>
  </footer>

<div id="imageModal" class="image-modal">
  <img id="modalImage" src="" alt="Full Size Cake">
</div>

<script>
function getCart() {
  return JSON.parse(localStorage.getItem("cakesByNicoleCart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cakesByNicoleCart", JSON.stringify(cart));
}

function getCartTotal() {
  let total = 0;

  getCart().forEach(function(item) {
    total += Number(item.price.replace("$", ""));
  });

  return total;
}

function updateCartTotal() {
  document.getElementById("cartTotal").textContent = "$" + getCartTotal().toFixed(2);
  document.getElementById("cartSummary").textContent = "Total: $" + getCartTotal().toFixed(2);
}

function renderCart() {
  const cart = getCart();
  const cartItems = document.getElementById("cartItems");

  if (cart.length === 0) {
    cartItems.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
  } else {
    cartItems.innerHTML = cart.map(function(item, index) {
      return `
        <div class="cart-item">
          <div class="cart-item-image">
            ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ""}
          </div>

          <div>
            <h3>${item.name}</h3>
          </div>

          <p>${item.price}</p>

          <button class="remove-button" onclick="removeItem(${index})">Remove</button>
        </div>
      `;
    }).join("");
  }

  updateCartTotal();
}

function removeItem(index) {
  const cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
}

document.getElementById("checkoutButton").addEventListener("click", function () {
  const cart = getCart();

  if (cart.length === 0) {
    alert("Please Add a Product to your Cart First!");
    return;
  }

  saveCart([]);

  document.getElementById("cartItems").innerHTML =
    '<p class="order-message">Order completed! 🎉</p>';

  document.getElementById("cartSummary").style.display = "none";
  document.getElementById("checkoutButton").style.display = "none";
  document.getElementById("cartTotal").textContent = "$0.00";
});

const homeSearchForm = document.getElementById("homeSearchForm");
const homeSearchInput = document.getElementById("homeSearchInput");

if (homeSearchForm && homeSearchInput) {
  homeSearchForm.addEventListener("submit", function(event) {
    event.preventDefault();
    window.location.href = "cakes.html?search=" + encodeURIComponent(homeSearchInput.value || "All Cakes");
  });
}

renderCart();

const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImage");

document.querySelectorAll(".cake-icon img").forEach(function(img) {
  img.addEventListener("click", function() {
    modal.style.display = "flex";
    modalImg.src = this.src;
  });
});

/* Click anywhere to close */
modal.addEventListener("click", function() {
  modal.style.display = "none";
});
</script>

</body>
</html>
